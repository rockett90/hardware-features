name: Post gate checklist
on:
  pull_request:
    types: [opened]
permissions:
  contents: read
  pull-requests: write
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request.user.login === 'github-actions[bot]') {
              console.log('PR opened by bot — skipping checklist comment.');
              return;
            }

            const branch = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;

            // CDR and TRR: checklists are embedded in the PR body template.
            // Post a short orientation comment instead of the full checklist.
            if (/^signoff\/.*\/cdr/.test(branch)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## ✅ CDR Gate',
                  '',
                  'The CDR checklist is in the PR description above. Tick every item before requesting merge.',
                  '',
                  '**CI enforcement:** `gate-check` will block merge while any `- [ ]` item remains unchecked in the PR description.',
                  '',
                  'If an item does not apply, tick it and add a note in the PR description or in a comment.',
                ].join('\n'),
              });
              return;
            }

            if (/^signoff\/.*\/trr/.test(branch)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## ✅ TRR Gate',
                  '',
                  'The TRR checklist is in the PR description above. Tick every item before requesting merge.',
                  '',
                  '**CI enforcement:** `gate-check` will block merge while any `- [ ]` item remains unchecked in the PR description.',
                  '',
                  'If an item does not apply, tick it and add a note in the PR description or in a comment.',
                ].join('\n'),
              });
              return;
            }

            // init/ PRs: post PDR orientation comment
            if (/^init\//.test(branch)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## ✅ PDR Gate',
                  '',
                  'The PDR checklist is in the PR description above. Tick every item before requesting merge.',
                  '',
                  '**CI enforcement:** `gate-check` will block merge while any `- [ ]` item remains unchecked in the PR description.',
                  '',
                  '**Note:** The feature directory scaffold (stubs, KiCad templates, commitlint and release-please config) was committed to this branch automatically when the branch was first pushed. Pull the latest commits before editing any files if you have not already done so.',
                  '',
                  '**Note:** The initial datasheet stub has been generated and committed to this branch automatically when this PR was opened. Pull the latest commits if you have not already.',
                  '',
                  '**Required content in this PR:**',
                  '- `features/<feature>/requirements/feature-requirements.yaml` — with real REQ-IDs',
                  '- `features/<feature>/requirements/interface-requirements.yaml` — with real interface definitions',
                  '- `features/<feature>/requirements/verification-matrix.md` — with all REQ-IDs listed',
                  '- `features/<feature>/decisions/DDR-000-design-intent.md` — with real content',
                  '- `features/<feature>/decisions/DDR-000-decisions.md` — with at least one decision entry',
                ].join('\n'),
              });
              return;
            }

            if (/^release-please--/.test(branch)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## 📦 Release PR',
                  '',
                  'This PR was opened automatically by release-please. It tracks all conventional commits merged to `main` since the last release.',
                  '',
                  '**Before merging:**',
                  '- Confirm the `release/<feature>/approved` gate tag exists (Final Release sign-off must be complete)',
                  '- Review the CHANGELOG in the PR body — ensure all entries are accurate',
                  '- Confirm the version number is correct',
                  '',
                  '**How to merge:** Use **Merge pull request** (not squash). Release-please requires a true merge commit.',
                  '',
                  '> ⚠️ Never close this PR manually. Closing it prevents the production tag from being created.',
                ].join('\n'),
              });
              return;
            }

            // library/ PRs: post a brief orientation comment
            if (/^library\//.test(branch)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## 📚 Library update PR',
                  '',
                  'This PR updates the shared component library submodule.',
                  '',
                  'Before merging, confirm:',
                  '- The new library commit has been reviewed and tested with at least one feature',
                  '- No existing features are broken by the library change',
                  '- The submodule pointer is updated to the correct commit',
                ].join('\n'),
              });
              return;
            }
