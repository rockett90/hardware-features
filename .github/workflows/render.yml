name: Schematic render
on:
  issue_comment:
    types: [created]
permissions:
  contents: read
  pull-requests: write
jobs:
  render:
    if: github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '/render')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: render-pr-${{ github.event.issue.number }}
      cancel-in-progress: true
    # First run is slow (~1-3 min) while the ~2 GB image is pulled.
    # Subsequent runs use cached layers and are faster.
    steps:
      - name: Verify commenter has write access
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin','maintain','write','triage'].includes(data.permission)) {
              core.setFailed(`${context.payload.comment.user.login} does not have write access`);
            }

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.pulls.get({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref',      data.head.ref);
            core.setOutput('sha',      data.head.sha);
            core.setOutput('base_ref', data.base.ref);

      - uses: actions/checkout@v4
        with:
          ref:        ${{ steps.pr.outputs.ref }}
          submodules: recursive

      - name: Find changed feature
        id: find
        run: |
          # Must use steps.pr.outputs.base_ref — github.base_ref
          # is empty in issue_comment events.
          git fetch origin "${{ steps.pr.outputs.base_ref }}"
          FEATURE=$(git diff --name-only \
            "origin/${{ steps.pr.outputs.base_ref }}...HEAD" | \
            grep "^features/" | grep "\.kicad_sch$" | \
            head -1 | cut -d'/' -f2 || true)
          if [[ -z "$FEATURE" ]]; then
            FEATURE=$(find features -maxdepth 1 -mindepth 1 -type d \
              2>/dev/null | head -1 | cut -d'/' -f2 || true)
          fi
          if [[ -z "$FEATURE" ]]; then
            echo "has_feature=false" >> $GITHUB_OUTPUT
          else
            echo "has_feature=true"              >> $GITHUB_OUTPUT
            echo "feature=$FEATURE"              >> $GITHUB_OUTPUT
            echo "feature_dir=features/$FEATURE" >> $GITHUB_OUTPUT
          fi

      - name: Run KiBot SVG render
        id: kibot
        if: steps.find.outputs.has_feature == 'true'
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w "/repo/${{ steps.find.outputs.feature_dir }}" \
            "ghcr.io/inti-cmnb/kicad10_auto_full@sha256:81621e501169e66dc051a65a0e575c0ab2854f69a121f1f9d97aad2b0d4c0257" \
            kibot -c "/repo/${{ steps.find.outputs.feature_dir }}/.kibot.yml" schematic_svg 2>&1 || true
          SVG_COUNT=$(find "${{ steps.find.outputs.feature_dir }}/fab" \
            -name "*.svg" 2>/dev/null | wc -l)
          if [[ "$SVG_COUNT" -eq 0 ]]; then
            echo "no_svg=true"  >> $GITHUB_OUTPUT
          else
            echo "no_svg=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl     = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha        = '${{ steps.pr.outputs.sha }}'.slice(0,7);
            const ts         = new Date().toISOString().slice(0,16).replace('T',' ') + ' UTC';
            const hasFeature = '${{ steps.find.outputs.has_feature }}' === 'true';
            const noSvg      = '${{ steps.kibot.outputs.no_svg }}' !== 'false';
            let body;
            if (!hasFeature) {
              body = '## 📐 Schematic Render\nNo KiCad schematic changes found in this PR.';
            } else if (noSvg) {
              body = `## 📐 Schematic Render\n⚠️ KiBot did not produce an SVG. Check the [workflow run](${runUrl}) for errors.\n\n*Commit: \`${sha}\` — ${ts}*`;
            } else {
              body = `## 📐 Schematic Render\n✅ Render complete for \`${{ steps.find.outputs.feature }}\`\n\n📥 [Download SVG from workflow artifacts](${runUrl})\n\n*Commit: \`${sha}\` — ${ts}*`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## 📐 Schematic Render')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Upload SVG artifact
        if: steps.find.outputs.has_feature == 'true' &&
            steps.kibot.outputs.no_svg == 'false'
        uses: actions/upload-artifact@v4
        with:
          name:              schematic-renders-pr${{ github.event.issue.number }}
          path:              features/${{ steps.find.outputs.feature }}/fab/*.svg
          retention-days:    90
          if-no-files-found: warn
