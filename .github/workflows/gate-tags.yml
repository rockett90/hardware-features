name: Gate tags and library.lock
on:
  pull_request:
    types: [closed]
    branches: [main]
permissions:
  contents: write
  pull-requests: read
jobs:
  cdr-gate:
    if: github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'signoff/') &&
        contains(github.event.pull_request.head.ref, '/cdr')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: cdr-gate-${{ github.event.pull_request.head.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Extract feature name
        id: feature
        run: |
          REF="${{ github.event.pull_request.head.ref }}"
          FEATURE=$(echo "$REF" | sed 's|^signoff/||;s|/cdr.*$||')
          echo "name=$FEATURE" >> $GITHUB_OUTPUT

      - name: Create library.lock
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          mkdir -p "features/$FEATURE/reviews"
          LIB_SHA=$(git log -1 --format="%H" -- library/ 2>/dev/null \
            || git rev-parse HEAD)
          FEA_SHA=$(git log -1 --format="%H" -- "features/$FEATURE/" 2>/dev/null \
            || git rev-parse HEAD)
          LIB_SUBMODULE_URL=$(git -C library remote get-url origin 2>/dev/null || echo "unknown")
          cat > "features/$FEATURE/reviews/library.lock" <<EOF
          # Created automatically by CI at CDR gate. Do not edit manually.
          library-submodule-url: $LIB_SUBMODULE_URL
          library-submodule-commit: $LIB_SHA
          feature-commit: $FEA_SHA
          locked-at-gate: $(echo "${{ github.event.pull_request.head.ref }}" | sed 's|^signoff/[^/]*/||')
          locked-date: $(date +%Y-%m-%d)
          EOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "features/$FEATURE/reviews/library.lock"
          git commit -m "chore($FEATURE): create library.lock at CDR gate [skip ci]"
          MAX_ATTEMPTS=3
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              break
            fi
            if [[ $i -lt $MAX_ATTEMPTS ]]; then
              echo "Push attempt $i failed — retrying in 5s..."
              sleep 5
            else
              echo "All push attempts failed"
              exit 1
            fi
          done

      - name: Create CDR approved tag
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          REF="${{ github.event.pull_request.head.ref }}"
          # Check if this is a cycle-repeat (contains -rN)
          if [[ "$REF" =~ /cdr-r([0-9]+)$ ]]; then
            CYCLE="${BASH_REMATCH[1]}"
            git tag "cdr/${FEATURE}/r${CYCLE}/approved"
            git push origin "cdr/${FEATURE}/r${CYCLE}/approved"
          fi
          # Always update the floating approved tag (force)
          git tag -f "cdr/${FEATURE}/approved"
          git push --force origin "cdr/${FEATURE}/approved"

  trr-gate:
    if: github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'signoff/') &&
        contains(github.event.pull_request.head.ref, '/trr')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: trr-gate-${{ github.event.pull_request.head.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Extract feature name
        id: feature
        run: |
          REF="${{ github.event.pull_request.head.ref }}"
          FEATURE=$(echo "$REF" | sed 's|^signoff/||;s|/trr.*$||')
          echo "name=$FEATURE" >> $GITHUB_OUTPUT

      - name: Create and push TRR approved tag
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          REF="${{ github.event.pull_request.head.ref }}"
          if [[ "$REF" =~ /trr-r([0-9]+)$ ]]; then
            CYCLE="${BASH_REMATCH[1]}"
            git tag "trr/${FEATURE}/r${CYCLE}/approved"
            git push origin "trr/${FEATURE}/r${CYCLE}/approved"
          fi
          # Always update the floating approved tag (force)
          git tag -f "trr/${FEATURE}/approved"
          git push --force origin "trr/${FEATURE}/approved"

  release-gate:
    if: github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'signoff/') &&
        contains(github.event.pull_request.head.ref, '/release')
    runs-on: ubuntu-latest
    concurrency:
      group: release-gate-${{ github.event.pull_request.head.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Extract feature name
        id: gate
        run: |
          REF="${{ github.event.pull_request.head.ref }}"
          FEATURE=$(echo "$REF" | sed 's|^signoff/||;s|/release.*$||')
          echo "feature=$FEATURE" >> $GITHUB_OUTPUT

      - name: Create release gate tag
        run: |
          FEATURE="${{ steps.gate.outputs.feature }}"
          REF="${{ github.event.pull_request.head.ref }}"
          if [[ "$REF" =~ /release-r([0-9]+)$ ]]; then
            CYCLE="${BASH_REMATCH[1]}"
            git tag "release/${FEATURE}/r${CYCLE}/approved"
            git push origin "release/${FEATURE}/r${CYCLE}/approved"
          fi
          # Always update the floating approved tag (force)
          git tag -f "release/${FEATURE}/approved"
          git push --force origin "release/${FEATURE}/approved"

      - name: Generate datasheet Markdown
        run: |
          FEATURE="${{ steps.gate.outputs.feature }}"
          if [[ -f "features/$FEATURE/datasheet/specs.yaml" ]]; then
            RELEASE_TAG="release/$FEATURE/approved"
            LIBRARY_SHA=$(git rev-parse HEAD:library 2>/dev/null || echo "unknown")
            pip install pyyaml --quiet
            python3 scripts/ci/generate-datasheet.py \
              --feature "$FEATURE" \
              --repo-root "$PWD" \
              --release-tag "$RELEASE_TAG" \
              --commit-sha "${{ github.sha }}" \
              --library-sha "$LIBRARY_SHA"
            echo "Datasheet Markdown regenerated."
          else
            echo "No specs.yaml found — skipping Markdown regeneration."
          fi

      - name: Generate datasheet PDF
        uses: docker://pandoc/latex:3.6
        with:
          args: >-
            features/${{ steps.gate.outputs.feature }}/datasheet/${{ steps.gate.outputs.feature }}-datasheet.md
            -o features/${{ steps.gate.outputs.feature }}/datasheet/${{ steps.gate.outputs.feature }}-datasheet.pdf
            --pdf-engine=pdflatex
            -V geometry:margin=2cm
            -V fontsize=11pt
            --standalone
        continue-on-error: true

      - name: Generate FPTCS notes PDF
        uses: docker://pandoc/latex:3.6
        with:
          args: >-
            features/${{ steps.gate.outputs.feature }}/production/fptcs/fptcs-notes.md
            -o features/${{ steps.gate.outputs.feature }}/production/fptcs/fptcs-notes.pdf
            --pdf-engine=pdflatex
            -V geometry:margin=2cm
            -V fontsize=11pt
            --standalone
        continue-on-error: true

      - name: Install PDF tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends inkscape img2pdf ghostscript

      - name: Collect and convert release documents to PDF
        id: collect_pdfs
        run: |
          FEATURE="${{ steps.gate.outputs.feature }}"
          mkdir -p release-pdfs

          # Excluded extensions (documentation, KiCad project files, metadata)
          EXCLUDE_EXTS=(md yaml yml kicad_sch kicad_pcb kicad_pro kicad_prl json lock)

          while IFS= read -r -d '' FILE; do
            # Build the relative path from the features/<feature>/ root
            REL="${FILE#features/$FEATURE/}"
            EXT="${FILE##*.}"
            EXT_LOWER=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')

            # Check if this extension is excluded
            SKIP=false
            for X in "${EXCLUDE_EXTS[@]}"; do
              if [[ "$EXT_LOWER" == "$X" ]]; then SKIP=true; break; fi
            done
            [[ "$SKIP" == "true" ]] && continue

            # Derive a collision-safe slug from the relative path
            SLUG=$(echo "$REL" | tr '/' '__' | sed 's/\.[^.]*$//')

            if [[ "$EXT_LOWER" == "pdf" ]]; then
              cp "$FILE" "release-pdfs/${SLUG}.pdf"
            elif [[ "$EXT_LOWER" == "svg" ]]; then
              inkscape --export-type=pdf --export-filename="release-pdfs/${SLUG}.pdf" "$FILE" 2>/dev/null || true
            elif [[ "$EXT_LOWER" == "png" || "$EXT_LOWER" == "jpg" || "$EXT_LOWER" == "jpeg" ]]; then
              img2pdf "$FILE" -o "release-pdfs/${SLUG}.pdf" 2>/dev/null || true
            fi
          done < <(find "features/$FEATURE" -type f -print0)

          PDF_COUNT=$(find release-pdfs -name "*.pdf" | wc -l)
          echo "pdf_count=$PDF_COUNT" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release/${{ steps.gate.outputs.feature }}/approved
          name: "${{ steps.gate.outputs.feature }} — Release"
          body: |
            Production-authorised release for `${{ steps.gate.outputs.feature }}`.

            This release was created automatically when the `signoff/${{ steps.gate.outputs.feature }}/release`
            PR was merged and all gate checklist items were satisfied.

            Gate tags present at release:
            - `cdr/${{ steps.gate.outputs.feature }}/approved`
            - `trr/${{ steps.gate.outputs.feature }}/approved`
            - `release/${{ steps.gate.outputs.feature }}/approved`

            Attached files are the release document pack — see the workflow run for full manufacturing outputs.
          files: |
            release-pdfs/*.pdf
            features/${{ steps.gate.outputs.feature }}/datasheet/${{ steps.gate.outputs.feature }}-datasheet.pdf
            features/${{ steps.gate.outputs.feature }}/production/fptcs/fptcs-notes.pdf
          fail_on_unmatched_files: false
          prerelease: false
