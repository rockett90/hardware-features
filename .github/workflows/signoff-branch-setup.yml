name: Signoff branch setup
on:
  create:
concurrency:
  group: signoff-branch-setup-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  scaffold:
    if: >
      github.ref_type == 'branch' &&
      startsWith(github.ref, 'refs/heads/signoff/') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Extract feature name and gate type
        id: gate
        run: |
          REF="${GITHUB_REF_NAME}"
          FEATURE=$(echo "$REF" | sed 's|^signoff/||' | cut -d'/' -f1)
          GATE_FULL=$(echo "$REF" | sed 's|^signoff/||' | cut -d'/' -f2-)
          GATE_TYPE=$(echo "$GATE_FULL" | sed 's|-[0-9]*$||')
          echo "feature=$FEATURE" >> $GITHUB_OUTPUT
          echo "gate_full=$GATE_FULL" >> $GITHUB_OUTPUT
          echo "gate_type=$GATE_TYPE" >> $GITHUB_OUTPUT

      - name: Check if gate-evidence.md already exists
        id: check
        run: |
          FILE="features/${{ steps.gate.outputs.feature }}/reviews/gate-evidence-${{ steps.gate.outputs.gate_full }}.md"
          if [[ -f "$FILE" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and commit gate evidence
        if: steps.check.outputs.exists == 'false'
        run: |
          FEATURE="${{ steps.gate.outputs.feature }}"
          GATE_TYPE="${{ steps.gate.outputs.gate_type }}"
          GATE_FULL="${{ steps.gate.outputs.gate_full }}"
          DATE=$(date +%Y-%m-%d)
          HEAD_SHA=$(git rev-parse HEAD)

          case "$GATE_TYPE" in
            cdr)     PREV_TAG=""; PREV_GATE="PDR (no tag)"; NEXT_GATE="CDR" ;;
            trr)     PREV_TAG="cdr/${FEATURE}/approved"; PREV_GATE="CDR"; NEXT_GATE="TRR" ;;
            release) PREV_TAG="trr/${FEATURE}/approved"; PREV_GATE="TRR"; NEXT_GATE="Release" ;;
            *)       PREV_TAG=""; PREV_GATE="unknown";   NEXT_GATE="$GATE_FULL" ;;
          esac

          PREV_SHA="tag not found"
          PREV_DATE="unknown"
          if [[ -n "$PREV_TAG" ]]; then
            PREV_SHA=$(git rev-list -n 1 "refs/tags/${PREV_TAG}" 2>/dev/null || echo "tag not found")
            if [[ "$PREV_SHA" != "tag not found" ]]; then
              PREV_DATE=$(git log -1 --format="%ci" "$PREV_SHA" 2>/dev/null | cut -d' ' -f1 || echo "unknown")
            fi
          fi

          mkdir -p "features/${FEATURE}/reviews"
          OUT="features/${FEATURE}/reviews/gate-evidence-${GATE_FULL}.md"

          echo "# Gate evidence -- ${NEXT_GATE} sign-off"              > "$OUT"
          echo ""                                                       >> "$OUT"
          echo "| Field | Value |"                                     >> "$OUT"
          echo "|---|---|"                                              >> "$OUT"
          echo "| Feature | \`${FEATURE}\` |"                         >> "$OUT"
          echo "| Gate | ${NEXT_GATE} |"                               >> "$OUT"
          echo "| Branch | \`signoff/${FEATURE}/${GATE_FULL}\` |"     >> "$OUT"
          echo "| Branch created | ${DATE} |"                          >> "$OUT"
          echo "| main SHA at branch creation | \`${HEAD_SHA}\` |"    >> "$OUT"
          echo "| Previous gate | ${PREV_GATE} |"                     >> "$OUT"
          if [[ -n "$PREV_TAG" ]]; then
            echo "| Previous gate tag | \`${PREV_TAG}\` |"              >> "$OUT"
            echo "| Previous gate SHA | \`${PREV_SHA}\` |"              >> "$OUT"
            echo "| Previous gate date | ${PREV_DATE} |"                >> "$OUT"
          fi
          echo ""                                                       >> "$OUT"
          echo "> Created automatically by CI. Do not edit manually." >> "$OUT"

          SCH_SVG_GENERATED=false
          if [[ "$GATE_TYPE" == "release" ]]; then
            # Export schematic SVG for datasheet inclusion (release gate only)
            KICAD_IMAGE="ghcr.io/inti-cmnb/kicad10_auto_full@sha256:81621e501169e66dc051a65a0e575c0ab2854f69a121f1f9d97aad2b0d4c0257"
            # NOTE: This SHA must match the value in render.yml, erc-drc.yml, and hw-release.yml.
            if [[ -f "features/${FEATURE}/kicad/${FEATURE}.kicad_sch" ]]; then
              echo "Exporting schematic SVG for datasheet..."
              mkdir -p "features/${FEATURE}/datasheet"
              docker run --rm \
                -v "$PWD:/repo" \
                -w "/repo" \
                "$KICAD_IMAGE" \
                kicad-cli sch export svg \
                  --output "/repo/features/${FEATURE}/datasheet/" \
                  "/repo/features/${FEATURE}/kicad/${FEATURE}.kicad_sch" 2>&1 || true
              EXPORTED_SVG="features/${FEATURE}/datasheet/${FEATURE}.svg"
              if [[ -f "$EXPORTED_SVG" ]]; then
                mv "$EXPORTED_SVG" "features/${FEATURE}/datasheet/${FEATURE}-schematic.svg"
                SCH_SVG_GENERATED=true
                echo "Circuit SVG exported: features/${FEATURE}/datasheet/${FEATURE}-schematic.svg"
              else
                echo "Warning: kicad-cli ran but no SVG found — datasheet will be generated without circuit image"
              fi
            else
              echo "No schematic found at features/${FEATURE}/kicad/${FEATURE}.kicad_sch — skipping SVG export"
            fi
          fi

          EXT_REF="features/${FEATURE}/reviews/external-references.md"
          if [[ ! -f "$EXT_REF" ]]; then
            cp "scripts/ci/stubs/reviews/external-references.md" "$EXT_REF"
            sed -i "s/FEATURE_NAME/${FEATURE}/g" "$EXT_REF"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUT"
          git add "$EXT_REF"
          [[ "$SCH_SVG_GENERATED" == "true" ]] && git add "features/${FEATURE}/datasheet/${FEATURE}-schematic.svg" || true
          git diff --cached --quiet && exit 0
          git commit -m "chore(${FEATURE}): scaffold ${GATE_TYPE} gate evidence"
          git push origin "HEAD:${GITHUB_REF_NAME}"
