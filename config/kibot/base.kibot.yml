kibot:
  version: 1
global:
  out_dir: fab
preflight:
  run_erc: false   # ERC is handled by erc-drc.yml (informational, slash command). Running here would block manufacturing outputs on any violation.
  run_drc: false   # DRC is handled by erc-drc.yml (informational, slash command). Running here would block manufacturing outputs on any violation.
  ignore_unconnected: false
outputs:
  - name: schematic_svg
    comment: Schematic SVG for PR renders
    type: svg_sch_print
    dir: fab
    options:
      output: '%f-schematic.svg'
  - name: schematic_pdf
    comment: Schematic PDF
    type: pdf_sch_print
    dir: fab
    options:
      output: '%f-schematic.pdf'
  - name: bom
    comment: Bill of materials
    type: bom
    dir: fab
    options:
      output: '%f-bom.csv'
      ref_separator: ','
      group_fields: ['Value', 'Footprint', 'MPN']
      columns:
        - field: Refs
        - field: Quantity
        - field: Value
        - field: Footprint
        - field: MPN
        - field: Datasheet

  # ─── Manufacturing outputs ────────────────────────────────────────────────
  # These outputs are generated by hw-release.yml on production tag push.
  # KiCad 10 compatibility: PCB outputs (gerbers, drill, ipc_netlist, cpl,
  # pdf_pcb_print) have continue-on-error: true in hw-release.yml pending
  # confirmation against the INTI-CMNB/KiBot@v2_k9 Docker image.
  # ─────────────────────────────────────────────────────────────────────────
  - name: gerbers
    comment: Gerber files for all copper, mask, silkscreen, paste, and edge layers
    type: gerber
    dir: gerbers
    options:
      # KiCad 10 compatibility note: output format confirmed against INTI-CMNB/KiBot@v2_k9
      use_protel_extensions: true
      create_gerber_job_file: true
      output: "%f-%i.%x"
    layers:
      - F.Cu
      - B.Cu
      - F.Paste
      - B.Paste
      - F.Silkscreen
      - B.Silkscreen
      - F.Mask
      - B.Mask
      - Edge.Cuts
      - F.Courtyard
      - B.Courtyard
      - F.Fab
      - B.Fab

  - name: drill
    comment: Excellon drill files (PTH and NPTH)
    type: excellon
    dir: gerbers
    options:
      metric_units: true
      pth_and_npth_single_file: false
      output: "%f-%i.%x"

  - name: pdf_pcb_print
    comment: PDF of PCB layers for review
    type: pdf_pcb_print
    dir: docs
    options:
      output: "%f-pcb.pdf"
    layers:
      - F.Cu
      - B.Cu
      - F.Silkscreen
      - Edge.Cuts

  - name: bom_html
    comment: Bill of Materials — HTML format
    type: bom
    dir: bom
    options:
      format: HTML
      output: "%f-bom.html"
      columns:
        - References
        - Value
        - Footprint
        - Quantity Per PCB
        - 'Manufacturer Part Number'
        - 'Manufacturer'
        - 'Datasheet'

  - name: ipc_netlist
    comment: IPC-D-356 netlist for electrical test
    type: ipc_netlist
    dir: gerbers
    options:
      output: "%f-ipc.d356"

  - name: cpl
    comment: Pick and place / component placement list
    type: position
    dir: assembly
    options:
      format: CSV
      units: millimeters
      separate_files_for_front_and_back: true
      only_smd: true
      output: "%f-cpl-%i.csv"
