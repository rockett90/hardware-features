name: Init branch setup
# Phase 1 of the init flow (branch-time).
# Runs on every push to an init/** branch by a human actor.
# Scaffolds the 4 required PDR content files, patches commitlint.config.js,
# and patches release-please-config.json onto the branch so the engineer
# can fill in real content before opening the PR.
#
# Phase 2 is init-feature.yml (post-merge): scaffolds the full directory
# tree, copies KiCad project files, and creates the PDR gate tag.
on:
  push:
    branches:
      - init/**
concurrency:
  group: init-branch-setup-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  scaffold:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ github.token }}

      - name: Extract feature name
        id: feature
        run: echo "name=${GITHUB_REF_NAME#init/}" >> "$GITHUB_OUTPUT"

      - name: Scaffold PDR stubs and register feature config
        run: bash scripts/ci/init-branch-setup.sh "${{ steps.feature.outputs.name }}"

      - name: Commit scaffolding if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            ".github/commitlint.config.js" \
            ".github/release-please-config.json" \
            "features/${{ steps.feature.outputs.name }}"
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore(${{ steps.feature.outputs.name }}): scaffold PDR stubs and register feature config [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
