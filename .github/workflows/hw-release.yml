name: Manufacturing Release

on:
  push:
    tags:
      - '*-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  manufacturing-release:
    name: Generate and attach manufacturing artefacts
    runs-on: ubuntu-latest
    # Only fire on production tags — skip release candidates
    if: "!contains(github.ref_name, '-rc.')"
    env:
      KICAD_IMAGE: ghcr.io/inti-cmnb/kicad10_auto_full@sha256:81621e501169e66dc051a65a0e575c0ab2854f69a121f1f9d97aad2b0d4c0257
      # NOTE: This SHA must match the value in render.yml, erc-drc.yml, and hw-release.yml.
      # When updating, update all three files.

    steps:
      - name: Detect feature name from tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: <feature>-vX.Y.Z
          # Strip the version suffix to get the feature name
          FEATURE="${TAG%-v*}"
          VERSION="${TAG#*-v}"
          echo "feature=$FEATURE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Feature: $FEATURE  Version: $VERSION  Tag: $TAG"

      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify feature directory exists
        run: |
          FEATURE="${{ steps.tag.outputs.feature }}"
          if [ ! -d "features/$FEATURE" ]; then
            echo "ERROR: features/$FEATURE does not exist for tag ${{ steps.tag.outputs.tag }}"
            exit 1
          fi
          echo "Feature directory confirmed: features/$FEATURE"

      - name: Verify Final Release gate cleared
        run: |
          FEATURE="${{ steps.tag.outputs.feature }}"
          if ! git ls-remote --tags origin "release/$FEATURE/approved" | grep -q "release/$FEATURE/approved"; then
            echo "::error::Final Release gate not cleared — tag release/$FEATURE/approved not found."
            echo "Raise and merge a signoff/$FEATURE/release PR before pushing a production tag."
            echo "## ⛔ Final Release gate not cleared" >> $GITHUB_STEP_SUMMARY
            echo "Tag \`release/$FEATURE/approved\` was not found." >> $GITHUB_STEP_SUMMARY
            echo "Raise and merge a \`signoff/$FEATURE/release\` PR first." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Final Release gate cleared — release/$FEATURE/approved tag confirmed."

      - name: Run KiBot manufacturing outputs
        id: kibot_outputs
        continue-on-error: true
        run: |
          FEATURE="${{ steps.tag.outputs.feature }}"
          FAB_DIR="features/$FEATURE/fab/release"
          mkdir -p "$FAB_DIR"
          docker run --rm \
            -v "$PWD:/repo" \
            -w "/repo/features/$FEATURE" \
            "${{ env.KICAD_IMAGE }}" \
            kibot \
              -c /repo/config/kibot/base.kibot.yml \
              -e "$FEATURE.kicad_sch" \
              -b "pcb/$FEATURE.kicad_pcb" \
              -d /repo/$FAB_DIR \
              2>&1

      - name: Error if KiBot outputs failed
        if: steps.kibot_outputs.outcome == 'failure'
        run: |
          echo "::error::Manufacturing outputs FAILED — this release pack may be INCOMPLETE. Do NOT send to manufacturer without verifying outputs."
          echo "## ⛔ Manufacturing outputs FAILED" >> $GITHUB_STEP_SUMMARY
          echo "KiBot did not complete successfully. Gerbers, drill files, CPL, and/or BOM may be missing or incomplete." >> $GITHUB_STEP_SUMMARY
          echo "**Do NOT release to manufacturer.** Investigate the KiBot run above and resolve before proceeding." >> $GITHUB_STEP_SUMMARY

      - name: Create manufacturing ZIP
        run: |
          FEATURE="${{ steps.tag.outputs.feature }}"
          TAG="${{ steps.tag.outputs.tag }}"
          FAB_DIR="features/$FEATURE/fab/release"
          ZIP_NAME="${TAG}-manufacturing.zip"

          if [ -d "$FAB_DIR" ] && [ "$(ls -A "$FAB_DIR")" ]; then
            zip -r "$ZIP_NAME" "$FAB_DIR/"
            echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
            echo "zip_created=true" >> "$GITHUB_OUTPUT"
            echo "Created: $ZIP_NAME"
            ls -lh "$ZIP_NAME"
          else
            echo "zip_created=false" >> "$GITHUB_OUTPUT"
            echo "::error::No manufacturing outputs found in $FAB_DIR — ZIP not created. The KiBot step likely failed. Do NOT release to manufacturer."
            echo "## ⛔ Manufacturing ZIP not created" >> $GITHUB_STEP_SUMMARY
            echo "No files found in \`$FAB_DIR\`. KiBot output is missing or empty." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        id: create_zip

      - name: Upload manufacturing ZIP to GitHub Release
        if: steps.create_zip.outputs.zip_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.create_zip.outputs.zip_name }}
          fail_on_unmatched_files: true

      - name: Upload ERC report to GitHub Release
        # Attach ERC report if present — non-fatal if absent
        run: |
          FEATURE="${{ steps.tag.outputs.feature }}"
          TAG="${{ steps.tag.outputs.tag }}"
          ERC_REPORT="features/$FEATURE/fab/release/erc-report.txt"
          if [ -f "$ERC_REPORT" ]; then
            echo "ERC report found — uploading"
            gh release upload "$TAG" "$ERC_REPORT" --clobber
          else
            echo "No ERC report found — skipping"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
