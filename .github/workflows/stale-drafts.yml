name: Stale draft PR notification
on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC — dormant until repo is in use
permissions:
  pull-requests: write
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const cutoff = new Date(Date.now() - 21 * 24 * 60 * 60 * 1000);
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 100,
            });
            for (const pr of prs) {
              if (!pr.draft) continue;
              if (new Date(pr.updated_at) > cutoff) continue;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number,
                body: `@${pr.user.login} this draft PR has been inactive for 21+ days — please update its status or close it if no longer needed.`,
              });
            }
