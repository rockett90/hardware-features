name: Scaffold feature on init PR merge
on:
  pull_request:
    types: [closed]
    branches: [main]
concurrency:
  group: init-feature
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  scaffold:
    if: github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'init/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Extract feature name
        id: feature
        run: |
          FEATURE="${{ github.event.pull_request.head.ref }}"
          FEATURE="${FEATURE#init/}"
          echo "name=$FEATURE" >> $GITHUB_OUTPUT

      - name: Scaffold directories and copy stubs
        run: bash scripts/ci/init-feature.sh "${{ steps.feature.outputs.name }}"

      - name: Commit scaffolding if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(${{ steps.feature.outputs.name }}): scaffold feature directory [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Create PDR gate tag
        run: |
          git tag "pdr/${{ steps.feature.outputs.name }}/approved"
          git push origin "pdr/${{ steps.feature.outputs.name }}/approved"
