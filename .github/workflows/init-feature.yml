name: Create PDR tag on init PR merge
on:
  pull_request:
    types: [closed]
    branches: [main]
concurrency:
  group: init-feature
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  create-pdr-tag:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          token: ${{ github.token }}

      - name: Extract feature name
        id: feature
        run: |
          FEATURE="${{ github.event.pull_request.head.ref }}"
          FEATURE="${FEATURE#init/}"
          echo "name=$FEATURE" >> $GITHUB_OUTPUT

      - name: Create PDR gate tag
        run: |
          git tag "pdr/${{ steps.feature.outputs.name }}/approved"
          git push origin "pdr/${{ steps.feature.outputs.name }}/approved"
