name: AI schematic review
on:
  pull_request:
    types: [ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: false
        type: string
      head_sha:
        description: 'Head SHA to check out'
        required: false
        type: string
permissions:
  contents: read
  pull-requests: write
jobs:
  ai-review:
    # For pull_request events: skip draft PRs.
    # For workflow_dispatch: always run (dispatcher already verified permission).
    if: |
      github.event_name == 'workflow_dispatch' ||
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ai-review-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      cancel-in-progress: true
    env:
      MODEL: gpt-4.1
    steps:
      - name: Resolve PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? parseInt('${{ github.event.inputs.pr_number }}', 10)
              : context.payload.pull_request.number;
            const { data } = await github.rest.pulls.get({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('sha',       data.head.sha);
            core.setOutput('base_ref',  data.base.ref);

      - uses: actions/checkout@v4
        with:
          ref:        ${{ steps.pr.outputs.sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Check for KiCad files
        id: kicad
        run: |
          # Use the base ref resolved from PR details — github.base_ref is empty
          # for both workflow_dispatch and issue_comment triggered runs.
          git fetch origin "${{ steps.pr.outputs.base_ref }}"
          KICAD_FILES=$(git diff --name-only \
            "origin/${{ steps.pr.outputs.base_ref }}...HEAD" | \
            grep -E '\.(kicad_sch|kicad_pcb)$' || true)
          if [[ -z "$KICAD_FILES" ]]; then
            echo "has_kicad=false" >> $GITHUB_OUTPUT
          else
            echo "has_kicad=true" >> $GITHUB_OUTPUT
            { echo "files<<EOF"; echo "$KICAD_FILES"; echo "EOF"; } \
              >> $GITHUB_OUTPUT
          fi

      - name: Get feature name
        id: feature
        if: steps.kicad.outputs.has_kicad == 'true'
        run: |
          FEATURE=$(echo "${{ steps.kicad.outputs.files }}" | \
            grep "^features/" | head -1 | cut -d'/' -f2)
          echo "name=$FEATURE" >> $GITHUB_OUTPUT

      - name: Install kicad-happy system dependencies
        if: steps.kicad.outputs.has_kicad == 'true'
        run: sudo apt-get install -y ngspice poppler-utils
        # ngspice: enables SPICE simulation in kicad-happy analysis
        # poppler-utils: enables PDF datasheet processing

      - name: Run kicad-happy analysis
        id: kh
        if: steps.kicad.outputs.has_kicad == 'true'
        continue-on-error: true
        uses: aklofas/kicad-happy@v1.3.0

      - name: Read review context
        if: steps.kicad.outputs.has_kicad == 'true'
        run: |
          read_or_empty() { cat "$1" 2>/dev/null || echo "(not available)"; }
          {
            echo "=== REVIEW INSTRUCTIONS ==="
            read_or_empty .github/agents/instructions/schematic-review.md
            echo "=== REQUIREMENTS ==="
            read_or_empty "features/${{ steps.feature.outputs.name }}/requirements/feature-requirements.yaml"
            echo "=== INTERFACE REQUIREMENTS ==="
            read_or_empty "features/${{ steps.feature.outputs.name }}/requirements/interface-requirements.yaml"
            echo "=== COMPANY STANDARDS ==="
            read_or_empty .github/agents/context/company-standards.md
            echo "=== KICAD-HAPPY REPORT ==="
            read_or_empty "${{ steps.kh.outputs.report-path }}"
          } > /tmp/review-context.txt

      - name: Check review context size
        if: steps.kicad.outputs.has_kicad == 'true'
        run: |
          SIZE=$(wc -c < /tmp/review-context.txt)
          echo "Review context size: ${SIZE} bytes"
          MAX=102400  # 100 KB
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::warning::Review context is ${SIZE} bytes (limit ${MAX}). Truncating to prevent context window overflow."
            truncate -s $MAX /tmp/review-context.txt
            echo "[TRUNCATED: context exceeded 100KB and was cut off]" >> /tmp/review-context.txt
          fi

      - name: Call GitHub Models API
        if: steps.kicad.outputs.has_kicad == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODEL:        ${{ env.MODEL }}
        run: |
          node - <<'JSEOF'
          const fs    = require('fs');
          const https = require('https');

          const contextText = fs.readFileSync('/tmp/review-context.txt', 'utf8');
          const token       = process.env.GITHUB_TOKEN;
          const khStatus    = '${{ steps.kh.outputs.status }}' || 'unknown';
          const khCritical  = '${{ steps.kh.outputs.critical-count }}' || '0';

          const prompt = `You are reviewing a hardware schematic.

          kicad-happy deterministic analysis result: ${khStatus}
          Critical findings from deterministic analysis: ${khCritical}

          Context (review instructions, requirements, company standards, full kicad-happy analysis report):
          ${contextText}

          Produce a structured review following the instructions.
          Every finding must reference a specific designator, net name, or REQ-ID. No generic advice.
          Use CRITICAL for findings that must be resolved before merge.
          Use ADVISORY for findings that may be dismissed with reasoning.`;

          const body = JSON.stringify({
            model: process.env.MODEL,
            messages: [{ role: 'user', content: prompt }],
            max_tokens: 8000,
          });
          const req = https.request({
            hostname: 'api.githubcopilot.com',
            path: '/chat/completions',
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(body),
            },
          }, res => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              if (res.statusCode !== 200) {
                fs.writeFileSync('/tmp/ai-review.txt', `AI review unavailable: HTTP ${res.statusCode}\n${data}`);
                fs.writeFileSync('/tmp/model-used.txt', 'none');
              } else {
                fs.writeFileSync('/tmp/ai-review.txt', JSON.parse(data).choices[0].message.content);
                fs.writeFileSync('/tmp/model-used.txt', process.env.MODEL);
              }
            });
          });
          req.on('error', err => {
            fs.writeFileSync('/tmp/ai-review.txt', `AI review unavailable: ${err.message}`);
            fs.writeFileSync('/tmp/model-used.txt', 'none');
          });
          req.write(body);
          req.end();
          JSEOF

      - name: Post AI review comment
        if: steps.kicad.outputs.has_kicad == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs         = require('fs');
            const aiReview   = fs.readFileSync('/tmp/ai-review.txt',  'utf8');
            const modelUsed  = fs.readFileSync('/tmp/model-used.txt', 'utf8').trim();
            const khStatus   = '${{ steps.kh.outputs.status }}';
            const khCritical = '${{ steps.kh.outputs.critical-count }}';
            const prNumber   = parseInt('${{ steps.pr.outputs.pr_number }}', 10);

            const body = [
              '## 🤖 AI Schematic Review',
              '',
              `**Model:** \`${modelUsed}\``,
              `**kicad-happy:** ${khStatus} — ${khCritical} critical finding(s)`,
              '',
              '> ⚠️ Critical findings must be resolved or explicitly',
              '> dismissed with reasoning before this PR can merge.',
              '',
              aiReview,
              '',
              '---',
              '*To re-run: convert to Draft then back to Ready for Review, or use `/ai-review`.*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.startsWith('## 🤖 AI Schematic Review')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber, body,
              });
            }
