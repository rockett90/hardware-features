name: Signoff branch setup
# Fires on first push to any signoff/** branch by a human actor.
# Commits a gate-evidence.md file so the branch has at least one commit
# ahead of main, allowing a PR to be opened.
# Pattern mirrors init-branch-setup.yml.
on:
  push:
    branches:
      - signoff/**
concurrency:
  group: signoff-branch-setup-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  scaffold:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Extract feature name and gate type
        id: gate
        run: |
          REF="${GITHUB_REF_NAME}"
          FEATURE=$(echo "$REF" | sed 's|^signoff/||' | cut -d'/' -f1)
          GATE_FULL=$(echo "$REF" | sed 's|^signoff/||' | cut -d'/' -f2-)
          GATE_TYPE=$(echo "$GATE_FULL" | sed 's|-[0-9]*$||')
          echo "feature=$FEATURE"     >> $GITHUB_OUTPUT
          echo "gate_full=$GATE_FULL" >> $GITHUB_OUTPUT
          echo "gate_type=$GATE_TYPE" >> $GITHUB_OUTPUT

      - name: Check if gate-evidence.md already exists
        id: check
        run: |
          FEATURE="${{ steps.gate.outputs.feature }}"
          GATE_FULL="${{ steps.gate.outputs.gate_full }}"
          FILE="features/${FEATURE}/reviews/gate-evidence-${GATE_FULL}.md"
          if [[ -f "$FILE" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build gate evidence content
        if: steps.check.outputs.exists == 'false'
        run: |
          FEATURE="${{ steps.gate.outputs.feature }}"
          GATE_TYPE="${{ steps.gate.outputs.gate_type }}"
          GATE_FULL="${{ steps.gate.outputs.gate_full }}"
          DATE=$(date +%Y-%m-%d)
          HEAD_SHA=$(git rev-parse HEAD)

          case "$GATE_TYPE" in
            cdr)
              PREV_TAG="pdr/${FEATURE}/approved"
              PREV_GATE="PDR"
              NEXT_GATE="CDR"
              ;;
            trr)
              PREV_TAG="cdr/${FEATURE}/approved"
              PREV_GATE="CDR"
              NEXT_GATE="TRR"
              ;;
            release)
              PREV_TAG="trr/${FEATURE}/approved"
              PREV_GATE="TRR"
              NEXT_GATE="Release"
              ;;
            *)
              PREV_TAG=""
              PREV_GATE="unknown"
              NEXT_GATE="$GATE_FULL"
              ;;
          esac

          PREV_SHA=""
          PREV_DATE=""
          if [[ -n "$PREV_TAG" ]]; then
            PREV_SHA=$(git rev-list -n 1 "refs/tags/${PREV_TAG}" 2>/dev/null || echo "tag not found")
            if [[ "$PREV_SHA" != "tag not found" ]]; then
              PREV_DATE=$(git log -1 --format="%ci" "$PREV_SHA" 2>/dev/null | cut -d' ' -f1 || echo "unknown")
            fi
          fi

          mkdir -p "features/${FEATURE}/reviews"
          printf '%s\n' \
            "# Gate evidence -- ${NEXT_GATE} sign-off" \
            "" \
            "| Field | Value |" \
            "|---|---|" \
            "| Feature | \`${FEATURE}\` |" \
            "| Gate | ${NEXT_GATE} |" \
            "| Branch | \`signoff/${FEATURE}/${GATE_FULL}\` |" \
            "| Branch created | ${DATE} |" \
            "| main SHA at branch creation | \`${HEAD_SHA}\` |" \
            "| Previous gate | ${PREV_GATE} |" \
            "| Previous gate tag | \`${PREV_TAG}\` |" \
            "| Previous gate SHA | \`${PREV_SHA}\` |" \
            "| Previous gate date | ${PREV_DATE} |" \
            "" \
            "> This file was created automatically by CI when the signoff branch was pushed." \
            "> It records the state of main at the point this gate was opened." \
            "> Do not edit this file manually." \
            > "features/${FEATURE}/reviews/gate-evidence-${GATE_FULL}.md"

      - name: Commit gate evidence
        if: steps.check.outputs.exists == 'false'
        run: |
          FEATURE="${{ steps.gate.outputs.feature }}"
          GATE_FULL="${{ steps.gate.outputs.gate_full }}"
          GATE_TYPE="${{ steps.gate.outputs.gate_type }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "features/${FEATURE}/reviews/gate-evidence-${GATE_FULL}.md"
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore(${FEATURE}): scaffold ${GATE_TYPE} gate evidence [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
