name: Generate datasheet

on:
  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature name'
        required: true
      pr_number:
        description: 'PR number to comment on (optional)'
        required: false
        default: ''
      base_sha:
        description: 'Base SHA (unused — for dispatcher compatibility)'
        required: false
        default: ''
      head_sha:
        description: 'Head SHA (unused — for dispatcher compatibility)'
        required: false
        default: ''
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-datasheet:
    name: Generate feature datasheet
    runs-on: ubuntu-latest

    # For workflow_dispatch: always run.
    # For pull_request opened: create the datasheet stub on the PR branch
    #   if it does not already exist (never overwrite).
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Determine feature name
        id: feature
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.feature }}" >> $GITHUB_OUTPUT
            echo "mode=command" >> $GITHUB_OUTPUT
          else
            # pull_request event — extract feature from branch name
            # Only run for init/ branches — the datasheet stub is created once at feature initialisation
            REF="${{ github.event.pull_request.head.ref }}"
            if ! echo "$REF" | grep -qE '^init/'; then
              echo "Branch $REF is not an init branch — skip"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            FEATURE=$(echo "$REF" | sed 's|^init/||')
            if [[ -z "$FEATURE" ]]; then
              echo "Could not extract feature name from branch $REF — skip"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "name=$FEATURE" >> $GITHUB_OUTPUT
            echo "mode=pr-auto" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if datasheet already exists (auto mode only)
        id: check
        if: steps.feature.outputs.skip != 'true'
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          MODE="${{ steps.feature.outputs.mode }}"
          DATASHEET="features/$FEATURE/datasheet/$FEATURE-datasheet.md"
          if [[ "$MODE" != "command" && -f "$DATASHEET" ]]; then
            echo "Datasheet already exists — skipping auto-generation to avoid overwrite."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: pip install pyyaml

      - name: Generate datasheet Markdown
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        id: generate
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          python3 scripts/ci/generate-datasheet.py \
            --feature "$FEATURE" \
            --repo-root "$PWD"
          echo "datasheet_path=features/$FEATURE/datasheet/$FEATURE-datasheet.md" >> $GITHUB_OUTPUT

      - name: Commit datasheet to branch
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "features/$FEATURE/datasheet/$FEATURE-datasheet.md" || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore($FEATURE): generate datasheet stub [skip ci]"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          else
            # workflow_dispatch: push to main (regenerating on demand)
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Post PR comment
        if: |
          steps.feature.outputs.skip != 'true' &&
          steps.check.outputs.skip != 'true' &&
          inputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const feature = '${{ steps.feature.outputs.name }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.pr_number }}'),
              body: `✅ Datasheet Markdown generated for \`${feature}\`.\n\nSee [\`features/${feature}/datasheet/${feature}-datasheet.md\`](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/features/${feature}/datasheet/${feature}-datasheet.md).\n\nA PDF will be generated and attached to the GitHub Release at Final Release sign-off.`,
            });
