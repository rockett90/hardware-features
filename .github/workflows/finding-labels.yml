name: Finding label automation
on:
  pull_request:
    types: [opened, closed]
jobs:
  finding-opened:
    name: Label finding as in-progress
    if: github.event.action == 'opened' &&
        startsWith(github.event.pull_request.head.ref, 'finding/')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match  = branch.match(/^finding\/[^/]+\/(\d+)-/);
            if (!match) {
              core.warning(`Branch name "${branch}" does not match the required format: finding/<feature>/<issue-number>-<description>. No issue label was updated. Rename the branch to include the issue number as a numeric prefix, e.g. finding/buck-converter-5v/42-output-voltage-low.`);
              return;
            }
            const issueNumber = parseInt(match[1]);
            const prNumber    = context.payload.pull_request.number;
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, labels: ['finding: in-progress'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber,
                body: `🔧 Fix in progress — PR #${prNumber}`,
              });
            } catch (e) {
              core.warning(`Could not update issue #${issueNumber}: ${e.message}`);
            }

  finding-resolved:
    name: Label finding as resolved
    if: github.event.action == 'closed' &&
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'finding/')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match  = branch.match(/^finding\/[^/]+\/(\d+)-/);
            if (!match) {
              core.warning(`Branch name "${branch}" does not match the required format: finding/<feature>/<issue-number>-<description>. No issue label was updated. Rename the branch to include the issue number as a numeric prefix, e.g. finding/buck-converter-5v/42-output-voltage-low.`);
              return;
            }
            const issueNumber = parseInt(match[1]);
            const sha = context.payload.pull_request.merge_commit_sha?.slice(0,7) ?? 'unknown';
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, labels: ['finding: resolved'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ Fix merged — commit \`${sha}\``,
              });
            } catch (e) {
              core.warning(`Could not update issue #${issueNumber}: ${e.message}`);
            }
