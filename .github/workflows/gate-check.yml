name: Gate Check
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CDR and TRR PR body templates (.github/PULL_REQUEST_TEMPLATE/cdr-signoff.md
      # and trr-signoff.md) embed all checklist items directly in the PR description.
      # GitHub pre-fills the PR body with the template when the engineer opens the PR,
      # so pr.body contains the checklist and this check correctly enforces completion.
      # Do NOT move checklists back to comments — gate-check reads pr.body, not comments.
      - name: Check gate PR checklist completion
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const body = pr.body || '';

            const isGatePR = branch.startsWith('signoff/') || branch.startsWith('init/');
            if (!isGatePR) {
              console.log('Not a gate PR — skipping checklist check.');
              return;
            }

            const unchecked = (body.match(/- \[ \]/g) || []).length;
            if (unchecked > 0) {
              core.setFailed(`Gate PR has ${unchecked} unchecked item(s) in the checklist. All items must be checked before merge.`);
            } else {
              const gateType = branch.startsWith('init/') ? 'PDR' : 'CDR/TRR';
              console.log(`All ${gateType} checklist items checked ✅`);
            }
