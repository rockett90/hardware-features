name: Schematic render
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to render'
        required: false
        type: string
      head_sha:
        description: 'Head SHA to check out'
        required: false
        type: string
permissions:
  contents: read
  pull-requests: write
jobs:
  render:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KICAD_IMAGE: ghcr.io/inti-cmnb/kicad10_auto_full@sha256:81621e501169e66dc051a65a0e575c0ab2854f69a121f1f9d97aad2b0d4c0257
      # NOTE: This SHA must match the value in render.yml, erc-drc.yml, and hw-release.yml.
      # When updating, update all three files.
    concurrency:
      group: render-pr-${{ github.event.issue.number || github.event.inputs.pr_number }}
      cancel-in-progress: true
    # First run is slow (~1-3 min) while the ~2 GB image is pulled.
    # Subsequent runs use cached layers and are faster.
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? parseInt('${{ github.event.inputs.pr_number }}', 10)
              : context.issue.number;
            const { data } = await github.rest.pulls.get({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('ref',       data.head.ref);
            core.setOutput('sha',       data.head.sha);
            core.setOutput('base_ref',  data.base.ref);

      - uses: actions/checkout@v4
        with:
          ref:        ${{ steps.pr.outputs.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Pre-flight — verify kicad-cli and rasterisation tools
        run: |
          echo "## Pre-flight tool check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker run --rm \
            "${{ env.KICAD_IMAGE }}" \
            bash -c "kicad-cli sch export svg --help 2>&1 || true; echo '---'; which inkscape 2>/dev/null && echo 'inkscape: found' || echo 'inkscape: not found'; python3 -c 'import cairosvg; print(\"cairosvg: found\")' 2>/dev/null || echo 'cairosvg: not found'" || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Find all changed features
        id: find
        run: |
          # Must use steps.pr.outputs.base_ref — github.base_ref
          # is empty in issue_comment and workflow_dispatch events.
          git fetch origin "${{ steps.pr.outputs.base_ref }}"
          SCH_FEATURES=$(git diff --name-only \
            "origin/${{ steps.pr.outputs.base_ref }}...HEAD" | \
            grep "^features/" | grep "\.kicad_sch$" | \
            cut -d'/' -f2 | sort -u || true)
          PCB_FEATURES=$(git diff --name-only \
            "origin/${{ steps.pr.outputs.base_ref }}...HEAD" | \
            grep "^features/" | grep "\.kicad_pcb$" | \
            cut -d'/' -f2 | sort -u || true)
          FEATURES=$(printf '%s\n%s\n' "$SCH_FEATURES" "$PCB_FEATURES" | sort -u | grep -v '^[[:space:]]*$' || true)
          if [[ -z "$FEATURES" ]]; then
            echo "has_any_feature=false" >> $GITHUB_OUTPUT
            echo "features="             >> $GITHUB_OUTPUT
            echo "pcb_features="         >> $GITHUB_OUTPUT
          else
            echo "has_any_feature=true"  >> $GITHUB_OUTPUT
            # Encode as newline-separated list in output
            {
              echo "features<<EOF"
              echo "$FEATURES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            {
              echo "pcb_features<<EOF"
              echo "$PCB_FEATURES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Install analysis tools
        if: steps.find.outputs.has_any_feature == 'true'
        run: |
          sudo apt-get install -y --no-install-recommends ngspice poppler-utils python3-pip python3-cairosvg inkscape
          # Clone kicad-happy action and install its Python dependencies
          git clone --depth=1 --branch v1.3.0 https://github.com/aklofas/kicad-happy.git \
            "$RUNNER_TEMP/kicad-happy-action"
          if [[ -f "$RUNNER_TEMP/kicad-happy-action/requirements.txt" ]]; then
            pip3 install -q -r "$RUNNER_TEMP/kicad-happy-action/requirements.txt"
          fi
          # Install dependencies for the action scripts themselves
          for req in \
            "$RUNNER_TEMP/kicad-happy-action/skills/kicad/requirements.txt" \
            "$RUNNER_TEMP/kicad-happy-action/action/requirements.txt"; do
            [[ -f "$req" ]] && pip3 install -q -r "$req" || true
          done

      - name: Export schematic SVG per feature
        id: kibot
        if: steps.find.outputs.has_any_feature == 'true'
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          features_list=""
          features_no_pro=""
          features_no_svg=""

          while IFS= read -r FEATURE; do
            [[ -z "$FEATURE" ]] && continue

            features_list="${features_list}${FEATURE},"

            PRO_FILE="features/${FEATURE}/${FEATURE}.kicad_pro"
            if [[ ! -f "$PRO_FILE" ]]; then
              echo "⚠️  Skipping ${FEATURE}: ${PRO_FILE} not found"
              features_no_pro="${features_no_pro}${FEATURE},"
              continue
            fi

            SCH_FILE="features/${FEATURE}/${FEATURE}.kicad_sch"
            if [[ ! -f "$SCH_FILE" ]]; then
              SCH_FILE="features/${FEATURE}/schematics/${FEATURE}.kicad_sch"
            fi
            if [[ ! -f "$SCH_FILE" ]]; then
              echo "⚠️  Skipping ${FEATURE}: schematic not found"
              features_no_svg="${features_no_svg}${FEATURE},"
              continue
            fi

            # Pass a directory (trailing slash) to --output so kicad-cli exports
            # ALL sheets — including sub-sheets in hierarchical designs.
            # Each sheet is written as a separate numbered SVG file.
            mkdir -p "features/${FEATURE}/fab"
            echo "▶  Rendering feature: ${FEATURE}"
            docker run --rm \
              -v "$PWD:/repo" \
              -w "/repo" \
              "${{ env.KICAD_IMAGE }}" \
              kicad-cli sch export svg \
                --output "/repo/features/${FEATURE}/fab/" \
                "/repo/${SCH_FILE}" 2>&1 || true

            SVG_COUNT=$(find "features/${FEATURE}/fab" -name "*.svg" 2>/dev/null | wc -l)

            if [[ "$SVG_COUNT" -eq 0 ]]; then
              features_no_svg="${features_no_svg}${FEATURE},"
            fi

          done <<< "${{ steps.find.outputs.features }}"

          # Strip trailing commas
          features_list="${features_list%,}"
          features_no_pro="${features_no_pro%,}"
          features_no_svg="${features_no_svg%,}"

          echo "features_list=${features_list}"       >> $GITHUB_OUTPUT
          echo "features_no_pro=${features_no_pro}"   >> $GITHUB_OUTPUT
          echo "features_no_svg=${features_no_svg}"   >> $GITHUB_OUTPUT

      - name: Watermark SVG renders
        if: steps.find.outputs.has_any_feature == 'true'
        run: |
          while IFS= read -r FEATURE; do
            [[ -z "$FEATURE" ]] && continue
            find "features/${FEATURE}/fab" -name "*.svg" | while read SVG; do
              python3 - "$SVG" "${{ steps.pr.outputs.sha }}" <<'PYEOF'
import sys, datetime, xml.etree.ElementTree as ET
try:
    path, sha = sys.argv[1], sys.argv[2][:7]
    ts = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
    ET.register_namespace('', 'http://www.w3.org/2000/svg')
    tree = ET.parse(path)
    root = tree.getroot()
    ns = 'http://www.w3.org/2000/svg'
    tag = f'{{{ns}}}text' if root.tag.startswith('{') else 'text'
    txt = ET.SubElement(root, tag)
    txt.set('x', '98%')
    txt.set('y', '98%')
    txt.set('text-anchor', 'end')
    txt.set('font-family', 'monospace')
    txt.set('font-size', '10')
    txt.set('fill', '#999999')
    txt.set('opacity', '0.7')
    txt.text = f'SHA: {sha} | {ts} | /render'
    tree.write(path, xml_declaration=True, encoding='unicode')
except Exception as e:
    print(f'WARNING: watermark failed for {sys.argv[1]}: {e}', file=sys.stderr)
PYEOF
            done || true
          done <<< "${{ steps.find.outputs.features }}"

      - name: Run kicad-happy analysis per feature
        id: kicad_happy
        if: steps.find.outputs.has_any_feature == 'true'
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          happy_reports=""

          while IFS= read -r FEATURE; do
            [[ -z "$FEATURE" ]] && continue

            # Locate schematic: try feature root first, then schematics/ subdirectory.
            SCH_FILE="features/${FEATURE}/${FEATURE}.kicad_sch"
            if [[ ! -f "$SCH_FILE" ]]; then
              SCH_FILE="features/${FEATURE}/schematics/${FEATURE}.kicad_sch"
            fi
            if [[ ! -f "$SCH_FILE" ]]; then
              echo "⚠️  kicad-happy: skipping ${FEATURE} — schematic not found"
              continue
            fi

            echo "▶  kicad-happy analysis: ${FEATURE}"
            REPORT_DIR="$RUNNER_TEMP/kicad-happy-${FEATURE}"
            mkdir -p "$REPORT_DIR"

            # Run kicad-happy entrypoint with correct env
            # GITHUB_BASE_REF must be set — it is empty on issue_comment events
            # INPUT_DIFF_BASE=true enables the component/net change diff
            env -i \
              HOME="$HOME" \
              PATH="$PATH" \
              GITHUB_TOKEN="${GITHUB_TOKEN}" \
              GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
              GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
              GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
              GITHUB_SHA="${GITHUB_SHA}" \
              GITHUB_BASE_REF="${BASE_REF}" \
              GITHUB_OUTPUT="$REPORT_DIR/action.output" \
              GITHUB_STEP_SUMMARY="/dev/null" \
              INPUT_SCHEMATIC="${SCH_FILE}" \
              INPUT_PCB="" \
              INPUT_SEVERITY="all" \
              INPUT_DERATING_PROFILE="commercial" \
              INPUT_SPICE="true" \
              INPUT_DATASHEETS_DIR="" \
              INPUT_DIFF_BASE="true" \
              DIGIKEY_CLIENT_ID="" \
              DIGIKEY_CLIENT_SECRET="" \
              MOUSER_SEARCH_API_KEY="" \
              ELEMENT14_API_KEY="" \
              ACTION_PATH="$RUNNER_TEMP/kicad-happy-action" \
              bash "$RUNNER_TEMP/kicad-happy-action/action/entrypoint.sh" 2>&1 | tail -30 || true

            # Restore any files kicad-happy's diff may have checked out over our tree
            git checkout HEAD -- "features/${FEATURE}/" 2>/dev/null || true

            REPORT_PATH=$(grep "^report-path=" "$REPORT_DIR/action.output" 2>/dev/null \
              | cut -d= -f2- || true)
            if [[ -n "$REPORT_PATH" && -f "$REPORT_PATH" ]]; then
              happy_reports="${happy_reports}${FEATURE}:${REPORT_PATH},"
              echo "✅  kicad-happy report generated for ${FEATURE}"
            else
              echo "⚠️  kicad-happy: no report produced for ${FEATURE}"
            fi

          done <<< "${{ steps.find.outputs.features }}"

          happy_reports="${happy_reports%,}"
          echo "happy_reports=${happy_reports}" >> $GITHUB_OUTPUT

      - name: Upload SVG artifacts
        if: steps.find.outputs.has_any_feature == 'true'
        uses: actions/upload-artifact@v4
        with:
          name:              schematic-svgs-pr${{ steps.pr.outputs.pr_number }}
          path:              features/*/fab/*.svg
          retention-days:    90
          if-no-files-found: warn

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          HAPPY_REPORTS: ${{ steps.kicad_happy.outputs.happy_reports }}
        with:
          script: |
            const fs       = require('fs');
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha      = '${{ steps.pr.outputs.sha }}'.slice(0, 7);
            const ts       = new Date().toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
            const prNumber = parseInt('${{ steps.pr.outputs.pr_number }}', 10);

            const hasAnyFeature = '${{ steps.find.outputs.has_any_feature }}' === 'true';
            const featuresList  = '${{ steps.kibot.outputs.features_list }}';
            const featuresNoPro = '${{ steps.kibot.outputs.features_no_pro }}';
            const featuresNoSvg = '${{ steps.kibot.outputs.features_no_svg }}';
            const happyReports  = process.env.HAPPY_REPORTS || '';

            const toSet = s => new Set(s ? s.split(',').filter(Boolean) : []);
            const noPro = toSet(featuresNoPro);
            const noSvg = toSet(featuresNoSvg);

            // Parse kicad-happy reports map: "feature:path,feature:path"
            // Use indexOf to handle paths containing colons
            const happyMap = {};
            for (const entry of happyReports.split(',').filter(Boolean)) {
              const idx = entry.indexOf(':');
              if (idx > 0) {
                const feat = entry.slice(0, idx);
                const path = entry.slice(idx + 1);
                try { happyMap[feat] = fs.readFileSync(path, 'utf8').trim(); } catch {}
              }
            }

            let body = '## 📐 Schematic Render\n\n';

            if (!hasAnyFeature) {
              body += 'No KiCad schematic changes found in this PR.';
            } else {
              const features = featuresList ? featuresList.split(',').filter(Boolean) : [];
              for (const f of features) {
                body += `### \`${f}\`\n\n`;
                if (noPro.has(f)) {
                  body += `⚠️ \`features/${f}/${f}.kicad_pro\` not found — add the KiCad project file to enable rendering\n\n`;
                } else {
                  body += noSvg.has(f)
                    ? '⚠️ SVG render failed — check [workflow logs](' + runUrl + ')\n'
                    : '✅ SVG render complete (all sheets)\n';

                  if (happyMap[f]) {
                    body += '\n<details>\n<summary>📋 Design analysis & change summary</summary>\n\n';
                    body += happyMap[f] + '\n';
                    body += '</details>\n';
                  }
                  body += '\n';
                }
              }
              body += `📥 [Download SVGs from workflow artifacts](${runUrl})\n\n`;
              body += '---\n';
              body += `*Commit: \`${sha}\` — ${ts} · [Workflow run](${runUrl})*`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## 📐 Schematic Render')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber, body,
              });
            }
