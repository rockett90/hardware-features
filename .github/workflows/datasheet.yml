name: Generate datasheet

on:
  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature name'
        required: true
      pr_number:
        description: 'PR number to comment on (optional)'
        required: false
        default: ''
      base_sha:
        description: 'Base SHA (unused — for dispatcher compatibility)'
        required: false
        default: ''
      head_sha:
        description: 'Head SHA (unused — for dispatcher compatibility)'
        required: false
        default: ''
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-datasheet:
    name: Generate feature datasheet
    runs-on: ubuntu-latest

    # For workflow_dispatch: always run.
    # For pull_request: only run when a signoff/*/cdr branch is merged
    #   AND the datasheet does not already exist (never overwrite).
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Determine feature name
        id: feature
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.feature }}" >> $GITHUB_OUTPUT
            echo "mode=command" >> $GITHUB_OUTPUT
          else
            # pull_request event — check it's a CDR merge
            REF="${{ github.event.pull_request.head.ref }}"
            if [[ "${{ github.event.pull_request.merged }}" != "true" ]]; then
              echo "Not merged — skip"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            if ! echo "$REF" | grep -qE '^signoff/[^/]+/cdr'; then
              echo "Not a CDR branch — skip"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            FEATURE=$(echo "$REF" | sed 's|^signoff/||;s|/cdr.*$||')
            echo "name=$FEATURE" >> $GITHUB_OUTPUT
            echo "mode=cdr-auto" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if datasheet already exists (CDR auto mode only)
        id: check
        if: steps.feature.outputs.skip != 'true'
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          MODE="${{ steps.feature.outputs.mode }}"
          DATASHEET="features/$FEATURE/datasheet/$FEATURE-datasheet.md"
          if [[ "$MODE" == "cdr-auto" && -f "$DATASHEET" ]]; then
            echo "Datasheet already exists — skipping auto-generation to avoid overwrite."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: pip install pyyaml

      - name: Generate datasheet Markdown
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        id: generate
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          python3 scripts/ci/generate-datasheet.py \
            --feature "$FEATURE" \
            --repo-root "$PWD"
          echo "datasheet_path=features/$FEATURE/datasheet/$FEATURE-datasheet.md" >> $GITHUB_OUTPUT

      - name: Generate PDF via pandoc
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        continue-on-error: true
        id: pdf
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended texlive-latex-extra 2>/dev/null || true
          pandoc \
            "features/$FEATURE/datasheet/$FEATURE-datasheet.md" \
            -o "features/$FEATURE/datasheet/$FEATURE-datasheet.pdf" \
            --pdf-engine=pdflatex \
            -V geometry:margin=2cm \
            -V fontsize=11pt \
            --standalone 2>/dev/null && echo "pdf_created=true" >> $GITHUB_OUTPUT || echo "pdf_created=false" >> $GITHUB_OUTPUT

      - name: Commit datasheet to branch
        if: steps.feature.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: |
          FEATURE="${{ steps.feature.outputs.name }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "features/$FEATURE/datasheet/$FEATURE-datasheet.md" || true
          git add "features/$FEATURE/datasheet/$FEATURE-datasheet.pdf" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore($FEATURE): regenerate datasheet [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Post PR comment
        if: |
          steps.feature.outputs.skip != 'true' &&
          steps.check.outputs.skip != 'true' &&
          inputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const feature = '${{ steps.feature.outputs.name }}';
            const pdfNote = '${{ steps.pdf.outputs.pdf_created }}' === 'true'
              ? '\n📄 PDF also generated and committed.'
              : '\n⚠️ PDF generation failed — Markdown datasheet is available.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.pr_number }}'),
              body: `✅ Datasheet generated for \`${feature}\`.\n\nSee [\`features/${feature}/datasheet/${feature}-datasheet.md\`](../blob/main/features/${feature}/datasheet/${feature}-datasheet.md).${pdfNote}\n\n*Edit \`datasheet/specs.yaml\`, \`datasheet/application-notes.md\`, or \`datasheet/errata.md\` and run \`/datasheet\` again to update.*`,
            });
